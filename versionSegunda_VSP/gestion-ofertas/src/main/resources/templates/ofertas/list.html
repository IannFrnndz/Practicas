<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/header :: header('Listado de Ofertas')}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/navbar :: navbar}"></th:block>

<div class="main-content">
    <div class="container">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="display-6">Ofertas</h1>

            <a href="/ofertas/nueva" class="btn btn-success">
                <i class="bi bi-plus-circle"></i> Nueva oferta
            </a>
        </div>

        <table class="table table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Cliente</th>
                <th>Fecha</th>
                <th class="text-end">Acciones</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="oferta : ${ofertas}">
                <td th:text="${oferta.id}">1</td>
                <td th:text="${oferta.nombre}">Oferta</td>
                <td th:text="${oferta.cliente}">Cliente</td>
                <td th:text="${#temporals.format(oferta.fechaCreacion, 'dd/MM/yyyy')}"></td>

                <td class="text-end">
                    <a th:href="@{/ofertas/{id}(id=${oferta.id})}"
                       class="btn btn-primary btn-sm">
                        Ver
                    </a>

                    <a th:href="@{/ofertas/editar/{id}(id=${oferta.id})}"
                       class="btn btn-warning btn-sm">
                        Editar
                    </a>

                    <form th:action="@{/ofertas/eliminar/{id}(id=${oferta.id})}"
                          method="post"
                          style="display:inline;"
                          onsubmit="return confirm('¿Eliminar esta oferta?');">

                        <button class="btn btn-danger btn-sm">
                            Borrar
                        </button>

                    </form>
                </td>
            </tr>
            </tbody>

        </table>

    </div>
</div>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>

</body>
</html>
