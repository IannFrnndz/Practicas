<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/header :: header('Listado de Ofertas')}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/navbar :: navbar}"></th:block>

<div class="main-content">
    <div class="container">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="display-6">Ofertas</h1>

            <a href="/ofertas/nueva" class="btn btn-success">
                <i class="bi bi-plus-circle"></i> Nueva oferta
            </a>
        </div>

        <table class="table table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Precio</th>
                <th>Fecha Validez</th>
                <th>Estado</th>
                <th class="text-end">Acciones</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="oferta : ${ofertas}">
                <td th:text="${oferta.id}">1</td>
                <td th:text="${oferta.titulo}">Oferta</td>
                <td th:text="${oferta.precio}">0.00€</td>
                <td th:text="${#temporals.format(oferta.fechaValidez, 'dd/MM/yyyy')}"></td>
                <td>
                    <span th:if="${oferta.estado != null and oferta.estado.name() == 'PUBLICADA'}" class="badge bg-success">
                        <i class="bi bi-check-circle"></i> Publicada
                    </span>
                    <span th:if="${oferta.estado == null or oferta.estado.name() == 'BORRADOR'}" class="badge bg-warning">
                        <i class="bi bi-clock"></i> Borrador
                    </span>
                </td>

                <td class="text-end">
                    <a th:href="@{/ofertas/{id}(id=${oferta.id})}"
                       class="btn btn-primary btn-sm">
                        Ver
                    </a>

                    <a th:href="@{/ofertas/editar/{id}(id=${oferta.id})}"
                       class="btn btn-warning btn-sm">
                        Editar
                    </a>

                    <!-- Publicar/Despublicar -->
                    <a th:if="${oferta.estado.name() == 'BORRADOR'}"
                       th:href="@{/ofertas/publicar/{id}(id=${oferta.id})}"
                       class="btn btn-success btn-sm">
                        <i class="bi bi-upload"></i> Publicar
                    </a>
                    <a th:if="${oferta.estado.name() == 'PUBLICADA'}"
                       th:href="@{/ofertas/despublicar/{id}(id=${oferta.id})}"
                       class="btn btn-secondary btn-sm">
                        <i class="bi bi-pause"></i> Despublicar
                    </a>

                    <!-- Eliminar -->
                    <form th:action="@{/ofertas/eliminar/{id}(id=${oferta.id})}"
                          method="post"
                          style="display:inline;"
                          onsubmit="return confirm('¿Eliminar esta oferta?');">
                        <button class="btn btn-danger btn-sm">
                            <i class="bi bi-trash"></i>
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>

        </table>

    </div>
</div>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>

</body>
</html>
