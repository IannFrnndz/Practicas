<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/header :: header('Detalle de Oferta')}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/navbar :: navbar}"></th:block>

<div class="main-content">
    <div class="container">

        <div class="d-flex justify-content-between mb-4">
            <div>
                <h1 class="display-6" th:text="${oferta.titulo}">Oferta</h1>
                <p class="text-muted">
                    <span th:if="${oferta.estado.name() == 'PUBLICADA'}" class="badge bg-success">
                        <i class="bi bi-check-circle"></i> Publicada
                    </span>
                    <span th:unless="${oferta.estado.name() == 'PUBLICADA'}" class="badge bg-warning">
                        <i class="bi bi-clock"></i> Borrador
                    </span>
                </p>
            </div>

            <a href="/ofertas" class="btn btn-secondary h-50">
                <i class="bi bi-arrow-left"></i> Volver
            </a>
        </div>

        <div class="row">
            <!-- Imagen -->
            <div class="col-md-6 mb-3" th:if="${oferta.imagenUrl}">
                <div class="card">
                    <img th:src="${oferta.imagenUrl}" class="card-img-top" alt="Imagen oferta" style="max-height: 300px; object-fit: cover;">
                </div>
            </div>

            <!-- Detalles -->
            <div class="col-md-6 mb-3">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-info-circle"></i> Detalles
                    </div>
                    <div class="card-body">
                        <table class="table table-borderless">
                            <tr>
                                <th>ID:</th>
                                <td th:text="${oferta.id}"></td>
                            </tr>
                            <tr>
                                <th>Precio:</th>
                                <td><strong th:text="${'$' + #numbers.formatDecimal(oferta.precio, 1, 2)}">$0.00</strong></td>
                            </tr>
                            <tr>
                                <th>Fecha Validez:</th>
                                <td th:text="${#temporals.format(oferta.fechaValidez, 'dd/MM/yyyy')}">-</td>
                            </tr>
                            <tr>
                                <th>Creada:</th>
                                <td th:text="${#temporals.format(oferta.fechaCreacion, 'dd/MM/yyyy HH:mm')}">-</td>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Descripción -->
        <div class="card mb-3">
            <div class="card-header">
                <i class="bi bi-file-text"></i> Descripción
            </div>
            <div class="card-body">
                <p th:text="${oferta.descripcion}">Sin descripción</p>
            </div>
        </div>

        <!-- Acciones -->
        <div class="d-flex justify-content-end gap-2">
            <a th:href="@{/ofertas/editar/{id}(id=${oferta.id})}" class="btn btn-warning">
                <i class="bi bi-pencil"></i> Editar
            </a>

            <!-- Publicar/Despublicar -->
            <a th:if="${oferta.estado.name() == 'BORRADOR'}"
               th:href="@{/ofertas/publicar/{id}(id=${oferta.id})}"
               class="btn btn-success">
                <i class="bi bi-upload"></i> Publicar
            </a>
            <a th:if="${oferta.estado.name() == 'PUBLICADA'}"
               th:href="@{/ofertas/despublicar/{id}(id=${oferta.id})}"
               class="btn btn-secondary">
                <i class="bi bi-pause"></i> Despublicar
            </a>

            <!-- Eliminar -->
            <form th:action="@{/ofertas/eliminar/{id}(id=${oferta.id})}"
                  method="post"
                  style="display:inline;"
                  onsubmit="return confirm('¿Eliminar esta oferta?');">
                <button class="btn btn-danger">
                    <i class="bi bi-trash"></i> Eliminar
                </button>
            </form>
        </div>

    </div>
</div>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>

</body>
</html>
