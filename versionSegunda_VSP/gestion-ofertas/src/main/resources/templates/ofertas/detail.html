<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/header :: header('Detalle de Oferta')}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/navbar :: navbar}"></th:block>

<div class="main-content">
    <div class="container">

        <div class="d-flex justify-content-between mb-4">
            <h1 class="display-6" th:text="${oferta.nombre}">Oferta</h1>

            <a href="/ofertas" class="btn btn-secondary">
                Volver
            </a>
        </div>

        <div class="card">
            <div class="card-body">

                <p><strong>ID:</strong> <span th:text="${oferta.id}"></span></p>
                <p><strong>Nombre:</strong> <span th:text="${oferta.nombre}"></span></p>
                <p><strong>Cliente:</strong> <span th:text="${oferta.cliente}"></span></p>
                <p><strong>Descripción:</strong></p>

                <p th:text="${oferta.descripcion}"></p>

                <p>
                    <strong>Fecha:</strong>
                    <span th:text="${#temporals.format(oferta.fechaCreacion, 'dd/MM/yyyy HH:mm')}"></span>
                </p>

            </div>
        </div>

        <div class="mt-3 text-end">
            <a th:href="@{/ofertas/editar/{id}(id=${oferta.id})}" class="btn btn-warning">
                Editar
            </a>
        </div>

    </div>
</div>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>

</body>
</html>
