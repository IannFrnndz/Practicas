<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/header :: header('Dashboard - Gestion de Ofertas')}"></th:block>
</head>
<body>
<!-- Navbar -->
<th:block th:replace="~{fragments/navbar :: navbar}"></th:block>

<!-- Contenido Principal -->
<div class="main-content">
    <div class="container">
        <!-- Título de bienvenida -->
        <div class="row mb-4">
            <div class="col">
                <h1 class="display-5">
                    <i class="bi bi-speedometer2"></i> Dashboard
                </h1>
                <p class="lead">
                    Bienvenido, <strong th:text="${usuario.nombre}">Usuario</strong>
                </p>
            </div>
        </div>

        <!-- Estadísticas -->
        <div class="row">
            <div class="col-md-6 mb-3">
                <div class="card text-white" style="background-color:#ff8c00;">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="card-title">Total ofertas</h5>
                                <h2 class="mb-0" th:text="${totalPacientes}">0</h2>
                            </div>
                            <i class="bi bi-archive" style="font-size: 3rem; opacity: 0.5;"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Accesos rápidos -->
        <div class="row">
            <div class="col">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-lightning"></i> Accesos Rápidos
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <!-- Ver ofertas -->
                            <div class="col-md-4 mb-3">
                                <a href="/ofertas" class="btn btn-outline-warning w-100 p-3">
                                    <i class="bi bi-list-ul" style="font-size: 2rem;"></i>
                                    <p class="mb-0 mt-2">Ver Todas las Ofertas</p>
                                </a>
                            </div>

                            <!-- Nueva oferta -->
                            <div class="col-md-4 mb-3">
                                <a href="/ofertas/nuevo" class="btn btn-outline-success w-100 p-3">
                                    <i class="bi bi-folder-plus" style="font-size: 2rem;"></i>
                                    <p class="mb-0 mt-2">Nueva Oferta</p>
                                </a>
                            </div>

                            <!-- Gestionar ofertas -->
                            <div class="col-md-4 mb-3">
                                <a href="/usuarios" class="btn btn-outline-warning w-100 p-3">
                                    <i class="bi bi-folder2-open" style="font-size: 2rem;"></i>
                                    <p class="mb-0 mt-2">Gestionar Ofertas</p>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
